unbind r
bind r source-file ~/.tmux.conf

set -g mouse on

#Set vim move keybinds
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Permite que aplicações (como nvim) enviem sequências de clipboard
set -s set-clipboard on

# Opcional: Melhora a compatibilidade de cores e sequências
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',xterm*:Ms=\E]52;%p1%s;%p2%s\7'

set-option -ga terminal-overrides ",*:ala@:Tc"

set -g @plugin "janoamaral/tokyo-night-tmux"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-nvim 'session' #salvar janelas do nvim
set -g @plugin 'tmux-plugins/tmux-continuum'

# Configurações do tmux-continuum
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

set -g @tokyo-night-tmux_window_id_style digital
set -g @tokyo-night-tmux_pane_id_style hsquare
set -g @tokyo-night-tmux_zoom_id_style dsquare

set -g @tokyo-night-tmux_show_path 1
set -g @tokyo-night-tmux_path_format relative # 'relative' or 'full'
